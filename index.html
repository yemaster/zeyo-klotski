<!DOCTYPE html>

<html>

<head>
    <title>Zeyo Klotski</title>
    <style>
        body {
            background-color: #fafafc;
            color: #3a3b3c;
        }
        
        .mainShow {
            width: 100%;
            margin-top: 160px;
            text-align: center;
            opacity: 0;
            transition: opacity .5s;
        }
        
        .mainTitle {
            font-size: 72px;
            font-weight: 300;
        }
        
        .buttons button {
            border: none;
            border-radius: 0;
            outline: none;
            box-shadow: 0 2px 4px rgba(0, 0, 0, .2);
            padding: 12px 24px;
            font-size: 16px;
            background-color: #fff;
            color: #666;
            cursor: pointer;
            transition: all .2s;
        }
        
        .buttons button:hover {
            box-shadow: 0 4px 8px rgba(0, 0, 0, .2);
        }
        
        button.start {
            background-color: #41a5f0;
            color: #fcfcfc;
        }
        
        .buttons button:not(:first-child) {
            margin-left: 50px;
        }
    </style>
</head>

<body>
    <div class="mainShow" id="mainShow">
        <h1 class="mainTitle">Zeyo Klotski</h1>
        <div class="buttons">
            <button class="start" onclick="location.href='./pages/game.html'">Start</button>
            <button onclick="location.href='./help.html'">Help</button>
        </div>
    </div>
    <script>
        window.onload = function() {
            document.getElementById("mainShow").style.opacity = "1"
        }
    </script>
    <script src="copyright.js"></script>
</body>

</html>
